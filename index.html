<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxrides VIP</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f6fa;
      color: #222;
    }
    .container {
      max-width: 500px;
      margin: 20px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 24px 18px 32px 18px;
    }
    h1 {
      text-align: center;
      color: #1a237e;
      margin-bottom: 10px;
    }
    .top-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }
    .top-buttons a, .top-buttons button {
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
    }
    .top-buttons a:hover, .top-buttons button:hover {
      background: #3949ab;
    }
    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select, .google-places-input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #bdbdbd;
      margin-bottom: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .service-type-note {
      font-size: 0.9em;
      color: #e65100;
      margin-bottom: 8px;
    }
    .paradas-list {
      margin-bottom: 8px;
    }
    .parada-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .parada-item button {
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .parada-item button:hover {
      background: #b71c1c;
    }
    .am-pm-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .am-pm-btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #bdbdbd;
      background: #fff;
      color: #222;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }
    .am-pm-btn.selected {
      background: #1a237e;
      color: #fff;
      border-color: #1a237e;
    }
    #map {
      width: 100%;
      height: 220px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .precio {
      font-size: 1.2em;
      font-weight: bold;
      color: #388e3c;
      margin: 10px 0;
      text-align: center;
    }
    @media (max-width: 600px) {
      .container {
        max-width: 100vw;
        border-radius: 0;
        box-shadow: none;
        padding: 12px 4px 24px 4px;
      }
      #map {
        height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Luxrides VIP</h1>
    <div class="top-buttons">
      <a href="https://linkdenegocio.mx/Luxridesreservas.com" target="_blank">Pagar con Clip</a>
      <button id="whatsapp-btn" type="button">Confirmar por WhatsApp</button>
    </div>
    <form id="reserva-form" autocomplete="off">
      <label for="usuario">Nombre de usuario</label>
      <input type="text" id="usuario" name="usuario" required placeholder="Ej: estebanquito">

      <label for="tipo-servicio">Tipo de servicio</label>
      <select id="tipo-servicio" name="tipo-servicio">
        <option value="tiempo">Por tiempo</option>
        <option value="km">Por kilometraje</option>
      </select>
      <div id="nota-tiempo" class="service-type-note" style="display:none;">Solo se harán servicios por tiempo.</div>

      <div id="horas-servicio-container">
        <label for="horas-servicio">Horas de servicio (2-12)</label>
        <input type="number" id="horas-servicio" name="horas-servicio" min="2" max="12" value="2">
      </div>

      <label for="origen">Lugar de recogida</label>
      <input id="origen" class="google-places-input" placeholder="Ej: Hotel, aeropuerto, calle..." required>

      <div class="paradas-list" id="paradas-list"></div>
      <button type="button" id="agregar-parada">Agregar parada</button>

      <label for="destino">Destino final</label>
      <input id="destino" class="google-places-input" placeholder="Ej: Hotel, aeropuerto, calle..." required>

      <label for="fecha">Fecha de reserva</label>
      <input type="date" id="fecha" name="fecha" required>

      <label for="hora">Hora de llegada</label>
      <input type="time" id="hora" name="hora" required>
      <div class="am-pm-buttons">
        <button type="button" class="am-pm-btn selected" data-value="AM">AM</button>
        <button type="button" class="am-pm-btn" data-value="PM">PM</button>
      </div>

      <label for="pasajeros">Número de pasajeros</label>
      <input type="number" id="pasajeros" name="pasajeros" min="1" max="12" value="1" required>

      <div id="map"></div>

      <button type="button" id="calcular-precio">Calcular precio</button>
      <div class="precio" id="precio"></div>
    </form>
  </div>

  <!-- Google Maps y Places API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCUg6f_AeINCNn8VWU1GDjpjq5_e8A8GvQ&libraries=places"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDlzuMEutA5yDZLpRG62WEuxBQmi6y_tq0",
      authDomain: "luxridesreservas-d5102.firebaseapp.com",
      databaseURL: "https://luxridesreservas-d5102-default-rtdb.firebaseio.com",
      projectId: "luxridesreservas-d5102",
      storageBucket: "luxridesreservas-d5102.firebasestorage.app",
      messagingSenderId: "731425344327",
      appId: "1:731425344327:web:3ef04d1320750cd6e6da62",
      measurementId: "G-WM9QYXYKTX"
    };
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
  </script>

  <script>
    // --- Google Maps y Autocompletado ---
    let map, origenAutocomplete, destinoAutocomplete, paradaAutocompletes = [];
    let paradas = [];
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 19.0436, lng: -98.1986 }, // Puebla
        zoom: 12
      });
      origenAutocomplete = new google.maps.places.Autocomplete(document.getElementById('origen'), {
        componentRestrictions: { country: 'mx' },
        fields: ['place_id', 'geometry', 'name', 'formatted_address']
      });
      destinoAutocomplete = new google.maps.places.Autocomplete(document.getElementById('destino'), {
        componentRestrictions: { country: 'mx' },
        fields: ['place_id', 'geometry', 'name', 'formatted_address']
      });
    }
    window.initMap = initMap;
    window.onload = () => {
      initMap();
      document.getElementById('tipo-servicio').addEventListener('change', function() {
        document.getElementById('nota-tiempo').style.display = this.value === 'tiempo' ? 'block' : 'none';
        document.getElementById('horas-servicio-container').style.display = this.value === 'tiempo' ? 'block' : 'none';
      });
      document.getElementById('agregar-parada').onclick = function() {
        agregarParada();
      };
      document.getElementById('paradas-list').addEventListener('click', function(e) {
        if (e.target.classList.contains('borrar-parada')) {
          const idx = parseInt(e.target.dataset.idx);
          paradas.splice(idx, 1);
          renderParadas();
        }
      });
      // AM/PM
      document.querySelectorAll('.am-pm-btn').forEach(btn => {
        btn.onclick = function() {
          document.querySelectorAll('.am-pm-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
        };
      });
      // Calcular precio
      document.getElementById('calcular-precio').onclick = calcularPrecio;
      // WhatsApp
      document.getElementById('whatsapp-btn').onclick = enviarWhatsApp;
    };
    function agregarParada() {
      paradas.push("");
      renderParadas();
    }
    function renderParadas() {
      const list = document.getElementById('paradas-list');
      list.innerHTML = '';
      paradas.forEach((p, idx) => {
        list.innerHTML += `<div class="parada-item"><input class="google-places-input parada" data-idx="${idx}" placeholder="Parada #${idx+1}"><button type="button" class="borrar-parada" data-idx="${idx}">Borrar</button></div>`;
      });
      setTimeout(() => {
        document.querySelectorAll('.parada').forEach((input, idx) => {
          paradaAutocompletes[idx] = new google.maps.places.Autocomplete(input, {
            componentRestrictions: { country: 'mx' },
            fields: ['place_id', 'geometry', 'name', 'formatted_address']
          });
        });
      }, 100);
    }
    // --- Cálculo de precio ---
    function calcularPrecio() {
      const pasajeros = parseInt(document.getElementById('pasajeros').value);
      let tipoVehiculo = pasajeros > 3 ? 'camioneta' : 'carro';
      // Simulación de distancia (en km) para demo
      let distancia = Math.floor(Math.random() * 30) + 5; // 5 a 35 km
      let precio = 0;
      if (tipoVehiculo === 'carro') {
        if (distancia <= 4) precio = 240;
        else precio = 240 + (distancia - 4) * 30;
      } else {
        if (distancia <= 4) precio = 320;
        else precio = 320 + (distancia - 4) * 45;
      }
      document.getElementById('precio').innerText = `Precio estimado: $${precio} MXN (${tipoVehiculo}, ${distancia} km)`;
    }
    // --- WhatsApp ---
    function enviarWhatsApp() {
      const usuario = document.getElementById('usuario').value;
      const tipoServicio = document.getElementById('tipo-servicio').value;
      const horas = document.getElementById('horas-servicio').value;
      const origen = document.getElementById('origen').value;
      const destino = document.getElementById('destino').value;
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const ampm = document.querySelector('.am-pm-btn.selected').dataset.value;
      const pasajeros = document.getElementById('pasajeros').value;
      let paradasTxt = paradas.map((_, idx) => document.querySelector(`.parada[data-idx='${idx}']`).value).filter(Boolean).join(' | ');
      let mensaje = `Reserva Luxrides VIP\nUsuario: ${usuario}\nTipo: ${tipoServicio}\nHoras: ${horas}\nOrigen: ${origen}\nParadas: ${paradasTxt}\nDestino: ${destino}\nFecha: ${fecha}\nHora: ${hora} ${ampm}\nPasajeros: ${pasajeros}`;
      let url = `https://wa.me/5215527729551?text=${encodeURIComponent(mensaje)}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
