<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LuxRides — Concierge</title>
</head>
<body>
<script>
  (function () {
    const params = new URLSearchParams(location.search);
    const code = (params.get('c') || '').trim();

    if (code) {
      const payload = { code, ts: Date.now() };
      localStorage.setItem('luxrides_concierge_ref', JSON.stringify(payload));
    }

    // Redirige a la web principal de reservas
    location.replace('luxrides-3.7.html');
  })();
</script>
</body>
</html>
